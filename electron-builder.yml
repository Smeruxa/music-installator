appId: com.musicinstallator.app
productName: VK Music Installer
executableName: VKMusicInstaller
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - '!**/{src,electron,design-system,.cursor}/**'
  - '!**/*.{md,map}'
  - '!**/node_modules/*/{CHANGELOG.md,README.md,readme.md}'
  - '!node_modules/ffmpeg-static/ffmpeg'
  - '!node_modules/ffmpeg-static/ffmpeg.exe'
mac:
  target:
    - dmg
  category: public.app-category.music
  artifactName: ${productName}-${version}-${arch}.${ext}
  extraResources:
    - from: node_modules/ffmpeg-static/ffmpeg
      to: ffmpeg
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}
  extraResources:
    - from: node_modules/ffmpeg-static/ffmpeg.exe
      to: ffmpeg.exe
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
